<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>MobiFiber — Bản đồ vùng phủ Đắk Lắk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Tailwind CSS — preflight disabled to avoid Leaflet conflicts -->
  <script>
    window.tailwind = window.tailwind || {};
    tailwind.config = { corePlugins: { preflight: false } };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<!-- ── MAP ─────────────────────────────────────────── -->
<div id="map"></div>

<!-- ── BRANDING (bottom-left watermark) ────────────── -->
<div class="branding">
  <i data-lucide="wifi" class="branding-icon"></i>
  PHÒNG VIỄN THÔNG
</div>

<!-- ── SIDEBAR PANEL ────────────────────────────────── -->
<div class="control-box" id="controlBox">

  <!-- Header — always visible -->
  <div class="panel-header">
    <div class="panel-brand">
      <div class="panel-logo-bg">
        <i data-lucide="wifi" class="panel-logo-icon-el"></i>
      </div>
      <div>
        <div class="panel-title-main">MobiFiber</div>
        <div class="panel-title-sub">Vùng phủ Đắk Lắk</div>
      </div>
    </div>
    <span id="arrow" class="collapse-toggle" onclick="toggleControl()" title="Thu gọn">▲</span>
  </div>

  <!-- Body — hidden when .collapsed -->
  <div class="panel-body">

    <!-- Search: địa điểm / tọa độ -->
    <div class="search-row" style="position:relative">
      <div class="input-icon-wrap">
        <i data-lucide="map-pin" class="field-icon"></i>
        <input id="searchInput" class="panel-input" placeholder="Click đúp map / nhập tọa độ, địa chỉ">
      </div>
      <button onclick="searchLocation()" class="btn-search" title="Tìm kiếm">
        <i data-lucide="search" style="width:14px;height:14px"></i>
      </button>
      <div id="suggestBox" class="suggest-box"></div>
    </div>

    <!-- Search: khách hàng đã bán -->
    <div class="search-row" style="position:relative">
      <div class="input-icon-wrap" style="flex:1">
        <i data-lucide="user" class="field-icon"></i>
        <input id="customerSearchInput" class="panel-input" placeholder="Tìm khách hàng đã bán">
      </div>
      <div id="customerSuggestBox" class="suggest-box"></div>
    </div>

    <div class="divider"></div>

    <!-- Action buttons -->
    <div class="action-stack">
      <button id="feedbackBtn" class="btn-danger">
        <i data-lucide="alert-circle" class="btn-icon"></i>
        Nhập phản ánh sự cố
      </button>
      <button id="exportUpgradeBtn" onclick="exportUpgradeList()" class="btn-ghost" disabled>
        <i data-lucide="trending-up" class="btn-icon"></i>
        Tập điểm cần nâng cấp
      </button>
      <button id="exportKmlBtn" onclick="exportAllCirclesToKML()" class="btn-ghost" disabled>
        <i data-lucide="download" class="btn-icon"></i>
        Xuất KML toàn bộ tập điểm
      </button>
      <button id="exportUnmatchedCustomersBtn" onclick="exportUnmatchedCustomers()" class="btn-ghost" disabled>
        <i data-lucide="user-x" class="btn-icon"></i>
        KH chưa xác định tập điểm
      </button>
    </div>

    <div class="divider"></div>

    <!-- Filter hiệu suất -->
    <div class="filter-box">
      <div class="filter-header" onclick="toggleFilter()">
        <div class="filter-header-left">
          <i data-lucide="sliders-horizontal" style="width:13px;height:13px;color:#94a3b8;flex-shrink:0"></i>
          <span class="filter-header-label">Lọc theo hiệu suất</span>
        </div>
        <div class="filter-header-right">
          <span class="count-badge" id="cnt-total">0</span>
          <span id="filterArrow" class="filter-chevron">▼</span>
        </div>
      </div>

      <div id="filterContent" class="filter-content">
        <label class="filter-row">
          <input type="checkbox" class="eff-filter" value="lt20" checked>
          <span class="eff-dot" style="background:#3b82f6"></span>
          <span class="eff-label">&lt; 20%</span>
          <span class="eff-count" id="cnt-lt20">0</span>
        </label>
        <label class="filter-row">
          <input type="checkbox" class="eff-filter" value="20_50" checked>
          <span class="eff-dot" style="background:#22c55e"></span>
          <span class="eff-label">20 – 50%</span>
          <span class="eff-count" id="cnt-20_50">0</span>
        </label>
        <label class="filter-row">
          <input type="checkbox" class="eff-filter" value="50_80" checked>
          <span class="eff-dot" style="background:#f97316"></span>
          <span class="eff-label">50 – 80%</span>
          <span class="eff-count" id="cnt-50_80">0</span>
        </label>
        <label class="filter-row">
          <input type="checkbox" class="eff-filter" value="80_100" checked>
          <span class="eff-dot" style="background:#ef4444"></span>
          <span class="eff-label">80 – &lt;100%</span>
          <span class="eff-count" id="cnt-80_100">0</span>
        </label>
        <label class="filter-row">
          <input type="checkbox" class="eff-filter" value="gte100" checked>
          <span class="eff-dot" style="background:#111827"></span>
          <span class="eff-label">≥ 100%</span>
          <span class="eff-count" id="cnt-gte100">0</span>
        </label>
      </div>
    </div>

  </div><!-- /.panel-body -->
</div><!-- /.control-box -->

<!-- ── LEGEND (bottom-right) ────────────────────────── -->
<div class="legend hieusuat">
  <div class="legend-title">Hiệu suất sử dụng</div>
  <div class="legend-list">
    <div class="legend-row"><span class="eff-dot" style="background:#3b82f6"></span><span>&lt;20%</span></div>
    <div class="legend-row"><span class="eff-dot" style="background:#22c55e"></span><span>20–50%</span></div>
    <div class="legend-row"><span class="eff-dot" style="background:#f97316"></span><span>50–80%</span></div>
    <div class="legend-row"><span class="eff-dot" style="background:#ef4444"></span><span>80–&lt;100%</span></div>
    <div class="legend-row"><span class="eff-dot" style="background:#111827"></span><span>≥100%</span></div>
  </div>
</div>

<!-- ── LOCATE BUTTON (top-right) ────────────────────── -->
<button class="locate-btn" onclick="locateMe()" title="Định vị tôi">
  <i data-lucide="navigation-2" style="width:18px;height:18px;color:#2563eb"></i>
</button>

<!-- ── SCRIPTS ───────────────────────────────────────── -->
<script src="config.js"></script>
<script src="app.js"></script>
<script>lucide.createIcons();</script>

<!-- Tracking -->
<script>
const trackingUrl =
  (window.APP_CONFIG && window.APP_CONFIG.TRACKING_SCRIPT_URL) ||
  "https://script.google.com/macros/s/AKfycbypr-0OMKp6UopO_-cET65QxdwTpeoMV9q13nJMdt3PBR-GtTHkKBrfHsdqTJR24bko/exec";
fetch(
  trackingUrl + "?url=" + encodeURIComponent(window.location.href) + "&v=1",
  { mode: "no-cors" }
).catch(err => console.error("Tracking error:", err));
</script>
</body>
</html>
